name: Build DragonClient Fabric Versions

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - "1.16.2-fabric"
          - "1.17.1-fabric"
          - "1.18.1-fabric"
          - "1.18.2-fabric"
          - "1.19-fabric"
          - "1.19.2-fabric"
          - "1.19.3-fabric"
          - "1.19.4-fabric"
          - "1.20-fabric"
          - "1.20.1-fabric"
          - "1.20.2-fabric"
          - "1.20.4-fabric"
          - "1.20.6-fabric"
          - "1.21.1-fabric"
          - "1.21.3-fabric"
          - "1.21.4-fabric"
          - "1.21.5-fabric"
          - "1.21.6-fabric"
          - "1.21.7-fabric"
          - "1.21.9-fabric"
          - "1.21.11-fabric"
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.version }}
        run: ./gradlew :${{ matrix.version }}:build --no-daemon --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dragonclient-${{ matrix.version }}
          path: versions/${{ matrix.version }}/build/libs/*.jar
          retention-days: 30

  build-all:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Build Summary
        run: echo "All Fabric versions built successfully!"
